name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install tools
        run: python -m pip install --upgrade pip ruff black
      - name: Ruff
        run: ruff check src scripts
      - name: Black (check)
        run: black --check src scripts

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install mypy
        run: python -m pip install --upgrade pip mypy
      - name: Mypy
        run: mypy src/legal_ai

  eval:
    name: RAG evaluation gate
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      qdrant:
        image: qdrant/qdrant:v1.17.1
        ports:
          - 6333:6333
    env:
      QDRANT_URL: http://localhost:6333
      EMBEDDING_DEVICE: cpu
      RATE_LIMIT_ENABLED: "false"
      OLLAMA_CB_ENABLED: "false"
      INGEST_ASYNC_ENABLED: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run retrieval eval gate
        run: |
          if [ ! -f scripts/run_eval.py ]; then
            echo "::notice::Eval suite (Plan 2) not implemented yet — skipping gate."
            exit 0
          fi
          echo "Waiting for Qdrant to become ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz; then break; fi
            sleep 2
          done
          mkdir -p reports
          python scripts/run_eval.py --suite retrieval --top-k 8 --output reports/eval.json
      - name: Upload eval report
        if: always() && hashFiles('reports/eval.json') != ''
        uses: actions/upload-artifact@v5
        with:
          name: rag-eval-report
          path: reports/eval.json

  docker:
    name: Build & publish image
    runs-on: ubuntu-latest
    needs: [lint, eval]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
